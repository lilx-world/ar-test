<!doctype html>
<html lang="en">
  <head>
    <title>Dog Pinatas | XR Blocks</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.16.0/build/addons/"
        }
      }
    </script>
    <style>
      body { margin: 0; padding: 0; background-color: #111; overflow: hidden; }
    </style>
  </head>

  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * PinataInteraction extends xb.Script to manage our XR scene.
       * It handles the creation of the piñatas, collision detection (hands vs piñatas),
       * and the particle explosion logic for treats and confetti.
       */
      class PinataInteraction extends xb.Script {
        constructor() {
          super();
          this.particles = [];
          this.pinata1 = null;
          this.pinata2 = null;
        }

        init() {
          // Add basic lighting to illuminate our colorful piñatas
          this.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.5));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(2, 5, 2);
          dirLight.castShadow = true;
          this.add(dirLight);

          // Add a subtle floor to give a sense of depth and ground the physics bounce
          const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 })
          );
          floor.rotation.x = -Math.PI / 2;
          this.add(floor);

          // Create the left piñata (Cyan theme)
          this.pinata1 = this.createDogPinata(0.5); 
          this.pinata1.userData = { exploded: false, baseY: 1.4, respawning: false };
          this.pinata1.position.set(-0.6, 1.4, -1.2);
          this.add(this.pinata1);
          this.addString(this.pinata1);

          // Create the right piñata (Magenta theme)
          this.pinata2 = this.createDogPinata(0.85);
          this.pinata2.userData = { exploded: false, baseY: 1.3, respawning: false };
          this.pinata2.position.set(0.6, 1.3, -1.2);
          this.add(this.pinata2);
          this.addString(this.pinata2);
        }

        /**
         * Builds a low-poly, dog-shaped grouped mesh decorated like a piñata.
         */
        createDogPinata(hueOffset) {
          const group = new THREE.Group();
          
          // Main material for the piñata body
          const baseColor = new THREE.Color().setHSL(hueOffset, 0.9, 0.5);
          const mat = new THREE.MeshStandardMaterial({ 
            color: baseColor, 
            roughness: 0.7, 
            metalness: 0.1 
          });

          // Body
          const bodyGeo = new THREE.BoxGeometry(0.2, 0.15, 0.3);
          const body = new THREE.Mesh(bodyGeo, mat);
          body.position.set(0, 0, 0);
          group.add(body);

          // Head
          const headGeo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
          const head = new THREE.Mesh(headGeo, mat);
          head.position.set(0, 0.1, 0.15);
          group.add(head);

          // Snout
          const snoutGeo = new THREE.BoxGeometry(0.08, 0.06, 0.08);
          const snout = new THREE.Mesh(snoutGeo, mat);
          snout.position.set(0, 0.05, 0.22);
          group.add(snout);

          // Ears
          const earGeo = new THREE.BoxGeometry(0.02, 0.08, 0.04);
          const leftEar = new THREE.Mesh(earGeo, mat);
          leftEar.position.set(-0.05, 0.18, 0.13);
          leftEar.rotation.z = -0.2;
          group.add(leftEar);

          const rightEar = new THREE.Mesh(earGeo, mat);
          rightEar.position.set(0.05, 0.18, 0.13);
          rightEar.rotation.z = 0.2;
          group.add(rightEar);

          // Legs
          const legGeo = new THREE.BoxGeometry(0.04, 0.15, 0.04);
          const legPositions = [
            [-0.08, -0.12, 0.1],  // Front Left
            [0.08, -0.12, 0.1],   // Front Right
            [-0.08, -0.12, -0.1], // Back Left
            [0.08, -0.12, -0.1]   // Back Right
          ];
          for (const pos of legPositions) {
            const leg = new THREE.Mesh(legGeo, mat);
            leg.position.set(...pos);
            group.add(leg);
          }

          // Tail
          const tailGeo = new THREE.BoxGeometry(0.03, 0.15, 0.03);
          const tail = new THREE.Mesh(tailGeo, mat);
          tail.position.set(0, 0.05, -0.18);
          tail.rotation.x = -0.5;
          group.add(tail);

          // Add colorful paper fringes to make it look like a real piñata
          const fringeGeo = new THREE.BoxGeometry(0.03, 0.04, 0.01);
          for (let i = 0; i < 40; i++) {
            const fringeColor = new THREE.Color().setHSL((hueOffset + Math.random() * 0.3) % 1.0, 1.0, 0.6);
            const fringeMat = new THREE.MeshBasicMaterial({ color: fringeColor });
            const fringe = new THREE.Mesh(fringeGeo, fringeMat);
            
            fringe.position.set(
              (Math.random() - 0.5) * 0.22,
              (Math.random() - 0.5) * 0.15,
              (Math.random() - 0.5) * 0.32
            );
            
            // Align fringes slightly outward
            fringe.lookAt(new THREE.Vector3(fringe.position.x * 2, fringe.position.y, fringe.position.z * 2));
            group.add(fringe);
          }

          return group;
        }

        /**
         * Adds a simple vertical line above the piñata to act as its hanging string.
         */
        addString(pinata) {
          const material = new THREE.LineBasicMaterial({ color: 0xffffff });
          const points = [];
          points.push(new THREE.Vector3(0, 0.2, 0));
          points.push(new THREE.Vector3(0, 3.0, 0)); // Extends far up
          
          const geometry = new THREE.BufferGeometry().setFromPoints(points);
          const line = new THREE.Line(geometry, material);
          pinata.add(line);
        }

        /**
         * Creates a bone-shaped treat mesh to spawn during the explosion.
         */
        createTreat() {
          const treatGroup = new THREE.Group();
          const mat = new THREE.MeshStandardMaterial({ color: 0xeeddcc, roughness: 0.9 });

          // Central shaft
          const mid = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.06), mat);
          treatGroup.add(mid);

          // The 4 corner knobs of the bone
          const sphereGeo = new THREE.SphereGeometry(0.015);
          const offsets = [
            [-0.01, 0.03, 0], [0.01, 0.03, 0],
            [-0.01, -0.03, 0], [0.01, -0.03, 0]
          ];
          for (const offset of offsets) {
            const knob = new THREE.Mesh(sphereGeo, mat);
            knob.position.set(...offset);
            treatGroup.add(knob);
          }

          treatGroup.scale.setScalar(0.7);
          return treatGroup;
        }

        /**
         * Creates a small, brightly colored flat plane for confetti.
         */
        createConfetti() {
          const geo = new THREE.PlaneGeometry(0.03, 0.03);
          const mat = new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(Math.random(), 1.0, 0.5),
            side: THREE.DoubleSide
          });
          return new THREE.Mesh(geo, mat);
        }

        /**
         * Hides the target piñata and spawns physics-driven particles.
         */
        explode(pinata) {
          pinata.userData.exploded = true;
          pinata.visible = false;

          // Get exact world position of the piñata for spawn origin
          const origin = new THREE.Vector3();
          pinata.getWorldPosition(origin);

          // Spawn Treats (Bones)
          for (let i = 0; i < 20; i++) {
            const treat = this.createTreat();
            this.setupParticle(treat, origin, 3, 2);
          }

          // Spawn Confetti
          for (let i = 0; i < 50; i++) {
            const confetti = this.createConfetti();
            this.setupParticle(confetti, origin, 2, 4);
          }

          // Automatically respawn the piñata after 4 seconds
          setTimeout(() => {
            pinata.userData.exploded = false;
            pinata.userData.respawning = true;
            pinata.scale.setScalar(0.01);
            pinata.visible = true;
          }, 4000);
        }

        /**
         * Configures velocity, position, and lifespan for an explosion particle.
         */
        setupParticle(mesh, origin, spreadMultiplier, maxLife) {
          // Add slight scatter to initial position
          mesh.position.copy(origin);
          mesh.position.x += (Math.random() - 0.5) * 0.2;
          mesh.position.y += (Math.random() - 0.5) * 0.2;
          mesh.position.z += (Math.random() - 0.5) * 0.2;
          
          this.add(mesh);

          // Random outward and upward velocity
          const velocity = new THREE.Vector3(
            (Math.random() - 0.5) * spreadMultiplier,
            Math.random() * spreadMultiplier + 1.0, 
            (Math.random() - 0.5) * spreadMultiplier
          );

          // Random tumble speed
          const angularVelocity = new THREE.Vector3(
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10
          );

          this.particles.push({
            mesh: mesh,
            velocity: velocity,
            angularVelocity: angularVelocity,
            life: Math.random() * maxLife + 1.0 // Lifespan in seconds
          });
        }

        /**
         * Checks for proximity between user's hands/controllers and the piñatas.
         * We do this every frame to provide immediate "touch" responses.
         */
        checkCollisions() {
          const pinatas = [this.pinata1, this.pinata2];
          
          // Loop over all active XR controllers (hands or pointers)
          for (const controller of xb.core.input.controllers) {
            const controllerPos = new THREE.Vector3();
            controller.getWorldPosition(controllerPos);

            for (const pinata of pinatas) {
              if (pinata.userData.exploded || pinata.userData.respawning) continue;

              const pinataPos = new THREE.Vector3();
              pinata.getWorldPosition(pinataPos);

              // Explosion Trigger Radius: ~25cm
              if (controllerPos.distanceTo(pinataPos) < 0.25) {
                this.explode(pinata);
              }
            }
          }
        }

        /**
         * Standard event handler for XR selection (clicking or pinching).
         * Acts as a fallback so it's playable in the desktop simulator.
         */
        onSelectEnd(event) {
          const controller = event.target;
          const intersections = xb.core.input.intersectObjectByController(controller, this, true);
          
          if (intersections.length > 0) {
            // Trace the intersection up to see if it belongs to one of our piñatas
            let obj = intersections[0].object;
            while (obj && obj !== this) {
              if (obj === this.pinata1 && !this.pinata1.userData.exploded) {
                this.explode(this.pinata1);
                return;
              }
              if (obj === this.pinata2 && !this.pinata2.userData.exploded) {
                this.explode(this.pinata2);
                return;
              }
              obj = obj.parent;
            }
          }
        }

        /**
         * Main render loop update step provided by xb.Script.
         */
        update() {
          const dt = xb.getDeltaTime();
          const time = performance.now() * 0.001;

          // 1. Check for physical touches
          this.checkCollisions();

          // 2. Animate the Piñatas
          const pinatas = [this.pinata1, this.pinata2];
          for (const pinata of pinatas) {
            if (pinata.userData.respawning) {
              // Pop-in scaling animation
              pinata.scale.lerp(new THREE.Vector3(1, 1, 1), dt * 6);
              if (pinata.scale.x > 0.98) {
                pinata.scale.setScalar(1);
                pinata.userData.respawning = false;
              }
            }

            if (!pinata.userData.exploded) {
              // Gentle rotation and bobbing to simulate hanging freely
              pinata.rotation.y = Math.sin(time + pinata.position.x) * 0.3;
              pinata.rotation.z = Math.cos(time * 1.5 + pinata.position.x) * 0.05;
              pinata.position.y = pinata.userData.baseY + Math.sin(time * 2.0 + pinata.position.x) * 0.05;
            }
          }

          // 3. Update Particle Physics (Treats & Confetti)
          for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.life -= dt;
            
            // Remove dead particles
            if (p.life <= 0) {
              this.remove(p.mesh);
              // Clean up geometry and material to prevent memory leaks
              if (p.mesh.geometry) p.mesh.geometry.dispose();
              if (p.mesh.material) p.mesh.material.dispose();
              
              this.particles.splice(i, 1);
              continue;
            }

            // Apply gravity
            p.velocity.y -= 9.8 * dt;

            // Apply movement
            p.mesh.position.addScaledVector(p.velocity, dt);
            
            // Apply tumbling rotation
            p.mesh.rotation.x += p.angularVelocity.x * dt;
            p.mesh.rotation.y += p.angularVelocity.y * dt;
            p.mesh.rotation.z += p.angularVelocity.z * dt;

            // Simple floor collision (bounce off y=0)
            if (p.mesh.position.y < 0) {
              p.mesh.position.y = 0;
              p.velocity.y *= -0.5; // Upward bounce reduction
              p.velocity.x *= 0.8;  // Friction sliding
              p.velocity.z *= 0.8;  // Friction sliding
              
              // Reduce tumbling slightly on bounce
              p.angularVelocity.multiplyScalar(0.7);
            }
          }
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        // Setup standard XR Blocks options
        const options = new xb.Options();
        options.setAppTitle('Dog Pinatas');
        
        // Enable AR mode to allow a "live feed" background (Passthrough)
        options.enableAR();
        
        // Ensure hands are enabled for full interaction in XR headsets
        options.enableHands();
        options.hands.enabled = true;
        options.hands.visualization = true;
        options.hands.visualizeMeshes = true;
        
        // Change simulator mode to make it easy to reach out and "touch" with the mouse pointer
        options.simulator.defaultMode = xb.SimulatorMode.POSE;

        // Start the application
        xb.add(new PinataInteraction());
        await xb.init(options);
      });
    </script>
  </body>
</html>
